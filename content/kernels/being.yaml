title: Being
ideas:
  - "Fundamental conflict: desire for freedom vs need to belong"
  - "One has time for everything they do\u2014trouble making time is trouble making choices"
  - Identity is defined by interests where one can legitimately compete for status
  - "Life optimizes for Flow or State, not both\u2014Flow is dynamic, State is static"
  - Possessions make us happy when they promote social connections, get us outdoors, or keep us active
